name: Publish images

# Build and push the runtime + migrator images to GHCR on main only.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: pgw-mock
            target: runtime
          - image: pgw-mock-dbmate
            target: migrator
    steps:
      - uses: actions/checkout@v6

      - id: meta
        name: Compute image tags
        env:
          IMAGE: ghcr.io/thekiharani/${{ matrix.image }}
          BRANCH: ${{ github.ref_name }}
          HEAD_SHA: ${{ github.sha }}
          VERSION: 1.0.${{ github.run_number }}
        run: |
          short_sha="${HEAD_SHA:0:7}"
          tags="${IMAGE}:${BRANCH}-latest,${IMAGE}:${BRANCH}-${VERSION},${IMAGE}:${BRANCH}-${short_sha}"
          if [ "${BRANCH}" = "main" ]; then
            tags="${tags},${IMAGE}:latest,${IMAGE}:${VERSION}"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
