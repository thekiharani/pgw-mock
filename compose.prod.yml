name: pgw_mock

services:
  migrate:
    image: ghcr.io/thekiharani/pgw-mock-dbmate:${IMAGE_TAG:-latest}
    container_name: noria-pgw-mock-migrate
    pull_policy: always
    restart: "no"
    env_file:
      - .env
    environment:
      DBMATE_MIGRATIONS_DIR: /db/migrations
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - norialabs

  app:
    image: ghcr.io/thekiharani/pgw-mock:${IMAGE_TAG:-latest}
    container_name: noria-pgw-mock
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${HOST_PORT:-4200}:4200"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    healthcheck:
      test:
        - CMD
        - /nodejs/bin/node
        - -e
        - "fetch('http://127.0.0.1:4200/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - norialabs

networks:
  norialabs:
    external: true
